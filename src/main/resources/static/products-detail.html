<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DEPRA · Saree Detail</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root{
          --bg: #fff5f0;
          --card: #fffaf6;
          --line: #ffd7c7;
          --coral: #e86f52;
          --coral-dark: #d85e40;
          --text: #3e2a26;
          --muted: #7f665f;
          --gold: #d4a373;
          --shadow: 0 18px 35px rgba(231,111,81,.10);
          --shadow-soft: 0 8px 18px rgba(0,0,0,.05);
          --radius: 26px;
        }

        body{
          font-family: 'Inter', sans-serif;
          background: radial-gradient(circle at top, #fffaf7 0%, #fff5f0 45%, #fff2ec 100%);
          color: var(--text);
        }

        .container{
          max-width: 1320px;
          margin: 0 auto;
          padding: 0 20px;
        }

        .site-header{
          position: sticky;
          top: 0;
          z-index: 1000;
          background: rgba(255,245,240,.92);
          backdrop-filter: blur(10px);
          border-bottom: 1px solid var(--line);
        }

        .header-inner{
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 16px;
          padding: 16px 0;
          flex-wrap: wrap;
        }

        .logo{
          font-family: 'Playfair Display', serif;
          font-size: 2rem;
          font-weight: 800;
          letter-spacing: .5px;
          background: linear-gradient(135deg, #d95d77, #e86f52);
          -webkit-background-clip: text;
          background-clip: text;
          -webkit-text-fill-color: transparent;
        }

        .nav-links{
          display: flex;
          gap: 26px;
          flex-wrap: wrap;
          align-items: center;
        }

        .nav-links a{
          text-decoration: none;
          color: var(--muted);
          font-weight: 700;
          padding-bottom: 4px;
          border-bottom: 2px solid transparent;
          transition: .2s;
        }

        .nav-links a:hover{
          color: var(--coral);
          border-bottom-color: var(--gold);
        }

        .btn-primary{
          border: none;
          background: linear-gradient(135deg, var(--coral), #f08a67);
          color: white;
          border-radius: 999px;
          font-weight: 700;
          cursor: pointer;
          padding: 12px 18px;
          box-shadow: 0 12px 20px rgba(231,111,81,.20);
          transition: .2s;
        }

        .btn-primary:hover{
          transform: translateY(-2px);
          background: var(--coral-dark);
        }

        .detail-wrap{
          display: grid;
          grid-template-columns: 1.1fr .9fr;
          gap: 26px;
          margin: 28px 0 24px;
        }

        .panel{
          background: rgba(255,255,255,.95);
          border: 1px solid #ffeadf;
          border-radius: 30px;
          box-shadow: var(--shadow);
          overflow: hidden;
        }

        .image-panel{
          padding: 18px;
        }

        .product-img{
          width: 100%;
          aspect-ratio: 4 / 5;
          object-fit: cover;
          border-radius: 24px;
          display: block;
          background: #fce8e0;
        }

        .info-panel{
          padding: 28px;
        }

        .crumb{
          color: var(--coral);
          font-weight: 800;
          font-size: .9rem;
          margin-bottom: 10px;
          display: inline-block;
        }

        .title{
          font-family: 'Playfair Display', serif;
          font-size: clamp(1.8rem, 3vw, 3rem);
          line-height: 1.1;
          margin-bottom: 14px;
        }

        .desc{
          color: var(--muted);
          line-height: 1.7;
          margin-bottom: 18px;
        }

        .meta-row{
          display: flex;
          gap: 10px;
          flex-wrap: wrap;
          margin-bottom: 18px;
        }

        .chip{
          background: #fff4ef;
          border: 1px solid #ffe2d5;
          border-radius: 999px;
          padding: 8px 12px;
          color: #5d4139;
          font-size: .9rem;
          font-weight: 600;
        }

        .price{
          font-size: 2rem;
          font-weight: 900;
          color: var(--coral);
          margin-bottom: 6px;
        }

        .mrp{
          color: #a9887d;
          text-decoration: line-through;
          margin-left: 10px;
          font-size: 1rem;
          font-weight: 600;
        }

        .cta-row{
          display: flex;
          gap: 12px;
          flex-wrap: wrap;
          margin: 20px 0 12px;
        }

        .btn-outline{
          border: 1px solid var(--line);
          background: white;
          color: var(--text);
          border-radius: 999px;
          font-weight: 700;
          cursor: pointer;
          padding: 12px 18px;
          transition: .2s;
          text-decoration: none;
          display: inline-flex;
          align-items: center;
          gap: 8px;
        }

        .btn-outline:hover{
          border-color: var(--coral);
          color: var(--coral);
        }

        .trust-box{
          background: #fff7f3;
          border: 1px solid #ffe2d5;
          border-radius: 20px;
          padding: 14px 16px;
          color: #664c43;
          margin-top: 18px;
        }

        .reviews{
          background: rgba(255,255,255,.95);
          border: 1px solid #ffeadf;
          border-radius: 30px;
          box-shadow: var(--shadow);
          padding: 26px;
          margin-bottom: 30px;
        }

        .section-title{
          font-family: 'Playfair Display', serif;
          font-size: 1.6rem;
          margin-bottom: 18px;
          color: #3c241f;
        }

        .review-item{
          border-bottom: 1px solid #ffdfd2;
          padding: 16px 0;
        }

        .review-item:last-child{ border-bottom: none; }

        .stars{
          color: #d8a65d;
          letter-spacing: 2px;
          font-size: 1rem;
          margin-bottom: 8px;
        }

        textarea, select{
          width: 100%;
          border: 1px solid #f0cfbf;
          border-radius: 18px;
          background: white;
          padding: 12px 14px;
          outline: none;
          font-family: inherit;
        }

        .review-form{
          background: #fff6f1;
          border: 1px solid #ffe2d5;
          padding: 18px;
          border-radius: 22px;
          margin-top: 18px;
        }

        .form-row{
          display: grid;
          grid-template-columns: 1fr auto;
          gap: 12px;
          align-items: start;
          margin-top: 12px;
        }

        footer{
          text-align: center;
          padding: 28px 16px;
          color: var(--muted);
          border-top: 1px solid #f1d7cb;
          background: rgba(255,250,246,.7);
        }

        @media (max-width: 960px){
          .detail-wrap{
            grid-template-columns: 1fr;
          }
        }
    </style>
</head>
<body>

<header class="site-header">
    <div class="container header-inner">
        <div class="logo">DEPRA</div>
        <nav class="nav-links">
            <a href="/home">Home</a>
            <a href="/products">Our products</a>
            <a href="/cart">Cart</a>
            <a href="/orders">Orders</a>
        </nav>
    </div>
</header>

<main class="container">
    <section class="detail-wrap" id="products-detail"></section>

    <section class="reviews">
        <h3 class="section-title">🌸 Customer Love</h3>
        <div id="reviewsList"></div>

        <div class="review-form">
            <h4 style="margin-bottom:10px; color:#3c241f;">Write a review</h4>
            <textarea id="reviewComment" rows="3" placeholder="Share your thoughts..."></textarea>
            <div class="form-row">
                <select id="ratingSelect">
                    <option>5</option>
                    <option>4</option>
                    <option>3</option>
                    <option>2</option>
                    <option>1</option>
                </select>
                <button class="btn-primary" onclick="submitReview()">Submit Review</button>
            </div>
        </div>
    </section>
</main>

<footer>🌸 DEPRA – Peach season, timeless grace 🌸</footer>

<script>
    (function(){
      const TOKEN_KEY = 'jwt_token';

      function getToken(){ return localStorage.getItem(TOKEN_KEY); }

      async function apiFetch(endpoint, options={}){
        const headers = {'Content-Type':'application/json'};
        const token = getToken();
        if(token && !options.public) headers['Authorization'] = `Bearer ${token}`;
        const res = await fetch(endpoint, {...options, headers});
        if(!res.ok) throw new Error(await res.text());
        return res.json();
      }

      function normalizeImageUrl(url){
        if(!url) return 'https://placehold.co/800x1000/ffe1d9/d95d77?text=No+Image';
        if(url.startsWith('http://') || url.startsWith('https://') || url.startsWith('/')) return url;
        return '/' + url;
      }

      const productId = new URLSearchParams(window.location.search).get('id');

      async function loadProduct(){
        try{
          let p;
          try{
            p = await apiFetch(`/api/products/${productId}`, {public:true});
          }catch{
            p = {
              id: productId,
              name: 'Peach Blossom Silk Saree',
              description: 'Handwoven with zari, soft peach hue perfect for day events.',
              price: 5499,
              mrp: 12000,
              color: 'Peach',
              material: 'Silk',
              occasion: 'Wedding',
              imageUrl: 'https://placehold.co/800x1000/ffdad4/d95d77?text=Peach+Silk'
            };
          }

          const imageUrl = normalizeImageUrl(p.imageUrl);

          document.getElementById('products-detail').innerHTML = `
            <div class="panel image-panel">
              <img class="product-img"
                   src="${imageUrl}"
                   onerror="this.onerror=null;this.src='https://placehold.co/800x1000/ffe1d9/d95d77?text=Image+Error'"
                   alt="${p.name}">
            </div>

            <div class="panel info-panel">
              <span class="crumb">Product Detail</span>
              <h1 class="title">${p.name}</h1>
              <p class="desc">${p.description || 'Premium quality saree with delicate embroidery and elegant drape.'}</p>

              <div class="meta-row">
                <span class="chip">${p.material || 'Fabric'}</span>
                <span class="chip">${p.color || 'Color'}</span>
                <span class="chip">${p.occasion || 'Occasion'}</span>
              </div>

              <div class="price">
                ₹${p.price}
                ${p.mrp ? `<span class="mrp">₹${p.mrp}</span>` : ''}
              </div>

              <div class="cta-row">
                <button class="btn-primary" onclick="addToCart(${p.id})">
                  <i class="fas fa-shopping-bag"></i> Add to Cart
                </button>
                <a class="btn-outline" href="/products"><i class="fas fa-arrow-left"></i> Back to Sarees</a>
              </div>

              <div class="trust-box">
                <i class="fas fa-truck"></i> Free shipping · Easy returns · Secure checkout
              </div>
            </div>
          `;

          loadReviews();
        }catch(e){
          console.warn(e);
          document.getElementById('products-detail').innerHTML = `
            <div class="panel info-panel" style="grid-column:1/-1;">
              <h2 class="title">Product could not load</h2>
              <p class="desc">Please check the product id or backend response.</p>
            </div>
          `;
        }
      }

      async function loadReviews(){
        const container = document.getElementById('reviewsList');
        try{
          const reviews = await apiFetch(`/api/reviews/product/${productId}`, {public:true});
          if(!reviews.length){
            container.innerHTML = `<p style="color:#b28b82;">✨ Be the first to review this saree ✨</p>`;
            return;
          }

          container.innerHTML = reviews.map(r => `
            <div class="review-item">
              <div class="stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
              <p style="margin:6px 0; color:#3e2a26;">${r.comment}</p>
              <small style="color:#a17f76;">— ${r.userName || 'DEPRA lover'}</small>
            </div>
          `).join('');
        }catch(e){
          container.innerHTML = `<p style="color:#b28b82;">🌸 Reviews loading…</p>`;
        }
      }

      window.addToCart = async function(id){
        if(!getToken()){
          alert('Please sign in to add items 🌸');
          window.location.href = '/home';
          return;
        }
        try{
          await apiFetch('/api/cart/add', {
            method:'POST',
            body: JSON.stringify({productId:id, quantity:1})
          });
          alert('Added to your bag!');
        }catch(e){
          alert('Could not add. Try again.');
        }
      };

      window.submitReview = async function(){
        if(!getToken()){
          alert('Login to share your review');
          return;
        }

        const comment = document.getElementById('reviewComment').value.trim();
        const rating = document.getElementById('ratingSelect').value;

        if(!comment){
          alert('Please write a review');
          return;
        }

        try{
          await apiFetch('/api/reviews/add', {
            method:'POST',
            body: JSON.stringify({productId, rating, comment})
          });
          alert('Thank you for your review 🌸');
          document.getElementById('reviewComment').value = '';
          loadReviews();
        }catch(e){
          alert('Review submission failed');
        }
      };

      window.onload = loadProduct;
    })();
</script>
</body>
</html>
