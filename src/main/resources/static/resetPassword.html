<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DEPRA | Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter', sans-serif; background:linear-gradient(135deg,#FFFDD0,#f7e9cf); min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .card { background:white; width:400px; padding:2rem; border-radius:32px; text-align:center; border-top:6px solid #D4AF37; }
    input { width:100%; padding:0.8rem; margin:0.5rem 0; border-radius:40px; border:1px solid #e0cfb0; }
    button { background:#800000; color:white; width:100%; padding:0.8rem; border-radius:40px; border:none; cursor:pointer; }
  </style>
</head>
<body>
<div class="card">
  <h2>Create new password</h2>
  <input type="password" id="newPass" placeholder="New password">
  <input type="password" id="confirmPass" placeholder="Confirm password">
  <button onclick="resetPassword()">Reset Password</button>
  <div id="msg" style="margin-top:1rem;"></div>
</div>
<script>
  const urlParams=new URLSearchParams(window.location.search);
  const token=urlParams.get('token');
  async function resetPassword(){ const newPass=document.getElementById('newPass').value, confirm=document.getElementById('confirmPass').value; if(newPass!==confirm){ document.getElementById('msg').innerText='Passwords do not match'; return; } const res=await fetch('/api/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,newPassword:newPass})}); if(res.ok){ document.getElementById('msg').innerHTML='✅ Password reset! <a href="/login">Login now</a>'; } else { document.getElementById('msg').innerText='Error: '+await res.text(); } }
  if(!token) document.getElementById('msg').innerText='Invalid reset link';
</script>
</body>
</html>
