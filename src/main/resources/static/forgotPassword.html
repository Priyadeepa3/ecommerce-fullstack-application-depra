<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DEPRA | Forgot Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter', sans-serif; background:linear-gradient(135deg,#FFFDD0,#f7e9cf); min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .card { background:white; width:400px; padding:2rem; border-radius:32px; text-align:center; border-top:6px solid #800000; }
        input { width:100%; padding:0.8rem; margin:1rem 0; border-radius:40px; border:1px solid #e0cfb0; }
        button { background:#800000; color:white; width:100%; padding:0.8rem; border-radius:40px; border:none; cursor:pointer; }
        .back { margin-top:1rem; }
    </style>
</head>
<body>
<div class="card">
    <h2>Reset Password</h2>
    <input type="email" id="email" placeholder="Your email">
    <button onclick="sendResetLink()">Send reset link</button>
    <div class="back"><a href="/login">Back to Login</a></div>
    <div id="msg" style="margin-top:1rem;"></div>
</div>
<script>
    async function sendResetLink(){ const email=document.getElementById('email').value; const res=await fetch('/api/auth/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})}); if(res.ok){ document.getElementById('msg').innerHTML='✅ Reset link sent! Check your email.'; } else { document.getElementById('msg').innerText='Error: '+await res.text(); } }
</script>
</body>
</html>
