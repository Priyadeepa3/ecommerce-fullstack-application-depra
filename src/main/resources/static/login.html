<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DEPRA | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter', sans-serif; background:linear-gradient(135deg,#FFFDD0,#f7e9cf); min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .login-card { background:white; width:420px; padding:2rem; border-radius:32px; box-shadow:0 20px 40px rgba(0,0,0,0.1); text-align:center; border-top:6px solid #800000; }
        .login-card h1 { font-family:'Playfair Display', serif; color:#800000; margin-bottom:1.5rem; }
        input { width:100%; padding:0.8rem; margin:0.6rem 0; border-radius:40px; border:1px solid #e0cfb0; }
        button { background:#800000; color:white; border:none; width:100%; padding:0.8rem; border-radius:40px; font-weight:bold; cursor:pointer; }
        .links { margin-top:1rem; font-size:0.9rem; }
        .links a { color:#800000; text-decoration:none; }
    </style>
</head>
<body>
<div class="login-card">
    <h1>Welcome Back</h1>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div class="links"><a href="/forgot-password">Forgot password?</a> | <a href="/signup">Create account</a></div>
    <div id="msg" style="margin-top:1rem; color:red;"></div>
</div>
<script>
    async function login(){ const email=document.getElementById('email').value, pass=document.getElementById('password').value; const res=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})}); if(res.ok){ const data=await res.json(); localStorage.setItem('jwt_token',data.accessToken||data.token); window.location.href='/home'; } else { document.getElementById('msg').innerText='Login failed'; } }
</script>
</body>
</html>
