<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DEPRA · Sarees</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root{
          --bg: #fff5f0;
          --card: #fffaf6;
          --line: #ffd7c7;
          --coral: #e86f52;
          --coral-dark: #d85e40;
          --text: #3e2a26;
          --muted: #7f665f;
          --gold: #d4a373;
          --shadow: 0 18px 35px rgba(231,111,81,.10);
          --shadow-soft: 0 8px 18px rgba(0,0,0,.05);
          --radius: 26px;
        }

        body{
          font-family: 'Inter', sans-serif;
          background: radial-gradient(circle at top, #fffaf7 0%, #fff5f0 45%, #fff2ec 100%);
          color: var(--text);
        }

        .container{
          max-width: 1320px;
          margin: 0 auto;
          padding: 0 20px;
        }

        .site-header{
          position: sticky;
          top: 0;
          z-index: 1000;
          background: rgba(255,245,240,.92);
          backdrop-filter: blur(10px);
          border-bottom: 1px solid var(--line);
        }

        .header-inner{
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 16px;
          padding: 16px 0;
          flex-wrap: wrap;
        }

        .logo{
          font-family: 'Playfair Display', serif;
          font-size: 2rem;
          font-weight: 800;
          letter-spacing: .5px;
          background: linear-gradient(135deg, #d95d77, #e86f52);
          -webkit-background-clip: text;
          background-clip: text;
          -webkit-text-fill-color: transparent;
        }

        .nav-links{
          display: flex;
          gap: 26px;
          flex-wrap: wrap;
          align-items: center;
        }

        .nav-links a{
          text-decoration: none;
          color: var(--muted);
          font-weight: 700;
          padding-bottom: 4px;
          border-bottom: 2px solid transparent;
          transition: .2s;
        }

        .nav-links a:hover,
        .nav-links a.active{
          color: var(--coral);
          border-bottom-color: var(--gold);
        }

        .auth-icons{
          display: flex;
          gap: 10px;
        }

        .icon-btn{
          width: 44px;
          height: 44px;
          border-radius: 50%;
          border: 1px solid var(--line);
          background: #fff;
          color: var(--coral);
          cursor: pointer;
          box-shadow: var(--shadow-soft);
          transition: .2s;
        }

        .icon-btn:hover{
          background: var(--coral);
          color: white;
          border-color: var(--coral);
          transform: translateY(-2px);
        }

        .btn-primary{
          border: none;
          background: linear-gradient(135deg, var(--coral), #f08a67);
          color: white;
          border-radius: 999px;
          font-weight: 700;
          cursor: pointer;
          padding: 12px 18px;
          box-shadow: 0 12px 20px rgba(231,111,81,.20);
          transition: .2s;
        }

        .btn-primary:hover{
          transform: translateY(-2px);
          background: var(--coral-dark);
        }

        .btn-outline{
          border: 1px solid var(--line);
          background: white;
          color: var(--text);
          border-radius: 999px;
          font-weight: 700;
          cursor: pointer;
          padding: 12px 18px;
          transition: .2s;
        }

        .btn-outline:hover{
          border-color: var(--coral);
          color: var(--coral);
        }

        .page-hero{
          padding: 28px 0 10px;
        }

        .hero-box{
          background: linear-gradient(135deg, rgba(255,255,255,.9), rgba(255,239,233,.95));
          border: 1px solid var(--line);
          border-radius: 32px;
          padding: 24px;
          box-shadow: var(--shadow);
          display: flex;
          justify-content: space-between;
          gap: 20px;
          align-items: center;
          flex-wrap: wrap;
        }

        .hero-text h2{
          font-family: 'Playfair Display', serif;
          font-size: clamp(1.8rem, 3vw, 3rem);
          margin-bottom: 8px;
          color: #3c241f;
        }

        .hero-text p{
          color: var(--muted);
          max-width: 620px;
        }

        .products-layout{
          display: grid;
          grid-template-columns: 300px 1fr;
          gap: 24px;
          margin: 24px 0 34px;
          align-items: start;
        }

        .filters-sidebar{
          background: rgba(255,250,246,.96);
          border: 1px solid var(--line);
          border-radius: 30px;
          padding: 20px;
          box-shadow: var(--shadow);
          position: sticky;
          top: 92px;
        }

        .filter-group{
          padding: 14px 0 18px;
          border-bottom: 1px solid #f7dfd4;
        }

        .filter-group:last-child{ border-bottom: none; }

        .filter-group h4{
          font-size: 1rem;
          color: var(--coral);
          margin-bottom: 14px;
          display: flex;
          align-items: center;
          gap: 8px;
        }

        .search-input,
        .range-input,
        .modal-card input{
          width: 100%;
          border: 1px solid #f0cfbf;
          border-radius: 999px;
          background: white;
          padding: 12px 14px;
          outline: none;
          font-family: inherit;
        }

        .search-input:focus,
        .range-input:focus,
        .modal-card input:focus,
        textarea:focus,
        select:focus{
          border-color: var(--coral);
          box-shadow: 0 0 0 3px rgba(231,111,81,.10);
        }

        .color-swatches{
          display: grid;
          grid-template-columns: repeat(5, 1fr);
          gap: 10px;
        }

        .swatch{
          width: 100%;
          aspect-ratio: 1;
          border-radius: 50%;
          border: 2px solid transparent;
          cursor: pointer;
          box-shadow: inset 0 0 0 1px rgba(0,0,0,.04), 0 3px 8px rgba(0,0,0,.05);
          transition: .15s;
        }

        .swatch.active{
          border-color: var(--coral);
          transform: scale(1.08);
        }

        .check-list label{
          display: block;
          margin-bottom: 10px;
          color: var(--text);
          cursor: pointer;
        }

        .check-list input{
          accent-color: var(--coral);
          margin-right: 8px;
        }

        .range-row{
          display: flex;
          justify-content: space-between;
          color: var(--muted);
          margin-top: 8px;
          font-size: .92rem;
        }

        .product-grid{
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
          gap: 22px;
        }

        .product-card{
          background: rgba(255,255,255,.95);
          border: 1px solid #ffeadf;
          border-radius: 28px;
          overflow: hidden;
          box-shadow: var(--shadow-soft);
          transition: .25s ease;
        }

        .product-card:hover{
          transform: translateY(-6px);
          box-shadow: 0 22px 34px rgba(217,93,119,.12);
        }

        .product-img-wrap{
          position: relative;
          aspect-ratio: 3 / 4;
          background: linear-gradient(180deg, #fff2ec, #ffe9df);
        }

        .product-img{
          width: 100%;
          height: 100%;
          object-fit: cover;
          display: block;
        }

        .badge{
          position: absolute;
          top: 14px;
          left: 14px;
          background: rgba(255,255,255,.92);
          color: var(--coral);
          font-weight: 800;
          font-size: .78rem;
          padding: 7px 12px;
          border-radius: 999px;
          border: 1px solid #ffd9ca;
        }

        .product-info{
          padding: 16px;
        }

        .product-info h4{
          font-size: 1.02rem;
          font-weight: 800;
          margin-bottom: 8px;
          color: #3c241f;
          min-height: 42px;
        }

        .meta{
          display: flex;
          gap: 8px;
          flex-wrap: wrap;
          margin-bottom: 12px;
          color: var(--muted);
          font-size: .88rem;
        }

        .chip{
          background: #fff4ef;
          border: 1px solid #ffe2d5;
          border-radius: 999px;
          padding: 5px 10px;
        }

        .price-row{
          display: flex;
          align-items: baseline;
          gap: 10px;
          margin-bottom: 14px;
        }

        .price{
          font-size: 1.35rem;
          font-weight: 900;
          color: var(--coral);
        }

        .old-price{
          text-decoration: line-through;
          color: #a9887d;
          font-size: .9rem;
        }

        .card-actions{
          display: grid;
          gap: 10px;
        }

        .empty-state{
          grid-column: 1 / -1;
          text-align: center;
          padding: 60px 20px;
          background: rgba(255,255,255,.75);
          border: 1px dashed #f0cdbd;
          border-radius: 28px;
          color: var(--muted);
        }

        .modal{
          display: none;
          position: fixed;
          inset: 0;
          background: rgba(0,0,0,.35);
          backdrop-filter: blur(6px);
          align-items: center;
          justify-content: center;
          z-index: 2000;
          padding: 20px;
        }

        .modal-card{
          width: min(460px, 100%);
          background: white;
          border-radius: 30px;
          border: 1px solid #ffd8ca;
          box-shadow: 0 30px 50px rgba(0,0,0,.15);
          padding: 24px;
        }

        .modal-card h3{
          color: var(--coral);
          margin-bottom: 12px;
          font-family: 'Playfair Display', serif;
          font-size: 1.7rem;
        }

        .modal-card input{
          margin: 8px 0;
          padding: 13px 16px;
        }

        .modal-actions{
          display: flex;
          gap: 10px;
          flex-wrap: wrap;
          margin-top: 16px;
        }

        footer{
          text-align: center;
          padding: 28px 16px;
          color: var(--muted);
          border-top: 1px solid #f1d7cb;
          background: rgba(255,250,246,.7);
        }

        @media (max-width: 980px){
          .products-layout{
            grid-template-columns: 1fr;
          }
          .filters-sidebar{
            position: static;
          }
        }

        @media (max-width: 640px){
          .nav-links{
            gap: 14px;
          }
          .color-swatches{
            grid-template-columns: repeat(4, 1fr);
          }
        }
    </style>
</head>
<body>

<header class="site-header">
    <div class="container header-inner">
        <div class="logo">DEPRA</div>

        <nav class="nav-links">
            <a href="/home">Home</a>
            <a href="/products" class="active">Products</a>
            <a href="/cart">Cart</a>
            <a href="/orders">Orders</a>
            <a href="/address">Address</a>
        </nav>

        <div class="auth-icons">
            <button class="icon-btn" id="authBtn" onclick="openAuthModal()"><i class="far fa-user"></i></button>
            <button class="icon-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </div>
</header>

<main class="container">
    <section class="page-hero">
        <div class="hero-box">
            <div class="hero-text">
                <h2>The DEPRA Diary</h2>
                <p>Where every drape tells a story of softness, strength, and quiet luxury.</p>
            </div>
            <button class="btn-primary" onclick="document.getElementById('searchInput').focus()">Step Into Your Era</button>
        </div>
    </section>

    <section class="products-layout">
        <aside class="filters-sidebar">
            <div class="filter-group">
                <h4><i class="fas fa-search"></i> Search</h4>
                <input class="search-input" type="text" id="searchInput" placeholder="Peach, silk, festive...">
            </div>

            <div class="filter-group">
                <h4><i class="fas fa-palette"></i> Colour</h4>
                <div class="color-swatches" id="colorSwatches"></div>
            </div>

            <div class="filter-group">
                <h4><i class="fas fa-hands"></i> Material</h4>
                <div id="materialFilters" class="check-list"></div>
            </div>

            <div class="filter-group">
                <h4><i class="fas fa-indian-rupee-sign"></i> Price (₹)</h4>
                <input class="range-input" type="range" id="priceMin" min="0" max="20000" step="500" value="0">
                <input class="range-input" type="range" id="priceMax" min="0" max="20000" step="500" value="20000">
                <div class="range-row">
                    <span id="minVal">0</span>
                    <span>to</span>
                    <span id="maxVal">20000</span>
                </div>
            </div>

            <div class="filter-group">
                <h4><i class="fas fa-sparkles"></i> Occasion</h4>
                <div id="occasionFilters" class="check-list"></div>
            </div>

            <button class="btn-primary" style="width:100%" onclick="applyFilters()">Apply Filters</button>
        </aside>

        <div class="product-grid" id="productGrid"></div>
    </section>
</main>

<footer>🌸 DEPRA · Peach season, timeless grace 🌸</footer>

<!-- Auth Modal -->
<div id="authModal" class="modal">
    <div class="modal-card">
        <h3 id="authTitle">Login</h3>
        <input type="email" id="authEmail" placeholder="Email">
        <div id="signupNameGroup" style="display:none;">
            <input type="text" id="authName" placeholder="Full name">
        </div>
        <input type="password" id="authPassword" placeholder="Password">

        <div class="modal-actions">
            <button class="btn-primary" id="authActionBtn" onclick="submitAuth()">Login</button>
            <button class="btn-outline" onclick="toggleAuthMode()">Sign Up</button>
        </div>

        <div id="authFeedback" style="margin-top:12px; color:#d95d77;"></div>
        <button onclick="closeAuthModal()" style="margin-top:14px; background:none; border:none; color:#7f6b64; cursor:pointer;">Cancel</button>
    </div>
</div>

<script>
    (function(){
      const TOKEN_KEY='jwt_token';
      let allProducts=[];
      let selectedColors = new Set();
      let selectedMaterials = new Set();
      let selectedOccasions = new Set();
      let authMode = 'login';

      function getToken(){ return localStorage.getItem(TOKEN_KEY); }
      function setToken(t){ localStorage.setItem(TOKEN_KEY, t); }
      function clearToken(){ localStorage.removeItem(TOKEN_KEY); }

      function normalizeImageUrl(url){
        if(!url) return 'https://placehold.co/600x800/ffe1d9/d95d77?text=No+Image';
        if(url.startsWith('http://') || url.startsWith('https://') || url.startsWith('/')) return url;
        return '/' + url;
      }

      async function loadProducts(){
        try{
          const res = await fetch('/api/products');
          if(res.ok) allProducts = await res.json();
          else throw new Error();
        }catch(e){
          allProducts = [
            { id:1, name:'Peach Blossom Silk Saree', price:5499, mrp:12000, color:'#f6c1b6', material:'silk', occasion:'wedding', imageUrl:'https://placehold.co/600x800/ffdad4/d95d77?text=Peach+Silk' },
            { id:2, name:'Rose Kanchipuram', price:7999, mrp:15000, color:'#f2a7b5', material:'silk', occasion:'festive', imageUrl:'https://placehold.co/600x800/fce4db/c85a6b?text=Rose+Saree' },
            { id:3, name:'Blush Organza Drape', price:4299, mrp:8900, color:'#ffe3e0', material:'organza', occasion:'party', imageUrl:'https://placehold.co/600x800/ffe1d9/d95d77?text=Blush' },
            { id:4, name:'Coral Georgette', price:6799, mrp:13500, color:'#f5a29a', material:'georgette', occasion:'festive', imageUrl:'https://placehold.co/600x800/fccac2/c85a6b?text=Coral' }
          ];
        }
        renderFilters();
        applyFilters();
      }

      function renderFilters(){
        const colors = [...new Set(allProducts.map(p=>p.color).filter(Boolean))];
        const materials = [...new Set(allProducts.map(p=>p.material).filter(Boolean))];
        const occasions = [...new Set(allProducts.map(p=>p.occasion).filter(Boolean))];

        document.getElementById('colorSwatches').innerHTML = colors.map(c =>
          `<div class="swatch" style="background:${c};" onclick="toggleColor('${c}', this)"></div>`
        ).join('');

        document.getElementById('materialFilters').innerHTML = materials.map(m =>
          `<label><input type="checkbox" onchange="toggleMaterial('${m}', this.checked)"> ${m}</label>`
        ).join('');

        document.getElementById('occasionFilters').innerHTML = occasions.map(o =>
          `<label><input type="checkbox" onchange="toggleOccasion('${o}', this.checked)"> ${o}</label>`
        ).join('');
      }

      window.toggleColor = function(c, el){
        if(selectedColors.has(c)) selectedColors.delete(c);
        else selectedColors.add(c);
        document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
        if(selectedColors.has(c)) el.classList.add('active');
        applyFilters();
      };

      window.toggleMaterial = function(m, checked){
        checked ? selectedMaterials.add(m) : selectedMaterials.delete(m);
        applyFilters();
      };

      window.toggleOccasion = function(o, checked){
        checked ? selectedOccasions.add(o) : selectedOccasions.delete(o);
        applyFilters();
      };

      function applyFilters(){
        let filtered = [...allProducts];
        const search = document.getElementById('searchInput').value.trim().toLowerCase();

        if(search) filtered = filtered.filter(p => (p.name || '').toLowerCase().includes(search));
        if(selectedColors.size) filtered = filtered.filter(p => selectedColors.has(p.color));
        if(selectedMaterials.size) filtered = filtered.filter(p => selectedMaterials.has(p.material));
        if(selectedOccasions.size) filtered = filtered.filter(p => selectedOccasions.has(p.occasion));

        const min = parseInt(document.getElementById('priceMin').value, 10);
        const max = parseInt(document.getElementById('priceMax').value, 10);
        document.getElementById('minVal').innerText = min;
        document.getElementById('maxVal').innerText = max;

        filtered = filtered.filter(p => p.price >= min && p.price <= max);
        renderProducts(filtered);
      }

      function renderProducts(prods){
        const grid = document.getElementById('productGrid');

        if(!prods.length){
          grid.innerHTML = `<div class="empty-state">🌸 No sarees match your filters. Try softening the search.</div>`;
          return;
        }

        grid.innerHTML = prods.map(p => {
          const imageUrl = normalizeImageUrl(p.imageUrl);
          return `
            <div class="product-card">
              <div class="product-img-wrap">
                <span class="badge">${p.occasion || 'New'}</span>
                <img class="product-img"
                     src="${imageUrl}"
                     onerror="this.onerror=null;this.src='https://placehold.co/600x800/ffe1d9/d95d77?text=Image+Error'"
                     alt="${p.name}">
              </div>
              <div class="product-info">
                <h4>${p.name}</h4>
                <div class="meta">
                  <span class="chip">${p.material || 'fabric'}</span>
                  <span class="chip">${p.color || 'color'}</span>
                </div>
                <div class="price-row">
                  <span class="price">₹${p.price}</span>
                  ${p.mrp ? `<span class="old-price">₹${p.mrp}</span>` : ''}
                </div>
                <div class="card-actions">
                  <button class="btn-primary" onclick="addToCart(${p.id})">Add to Cart</button>
                  <button class="btn-outline" onclick="location.href='/products-detail?id=${p.id}'">View Details</button>
                </div>
              </div>
            </div>
          `;
        }).join('');
      }

      window.addToCart = async function(id){
        if(!getToken()){
          openAuthModal();
          return;
        }
        try{
          await fetch('/api/cart/add', {
            method:'POST',
            headers:{
              'Content-Type':'application/json',
              'Authorization':`Bearer ${getToken()}`
            },
            body: JSON.stringify({ productId:id, quantity:1 })
          });
          alert('Added to your bag ✨');
        }catch(e){
          alert('Could not add item. Try again.');
        }
      };

      window.openAuthModal = function(){
        document.getElementById('authModal').style.display='flex';
        updateAuthUI();
      };

      window.closeAuthModal = function(){
        document.getElementById('authModal').style.display='none';
      };

      function updateAuthUI(){
        document.getElementById('authTitle').innerText = authMode === 'login' ? 'Welcome back 🌸' : 'Join DEPRA';
        document.getElementById('authActionBtn').innerText = authMode === 'login' ? 'Login' : 'Sign Up';
        document.getElementById('signupNameGroup').style.display = authMode === 'signup' ? 'block' : 'none';
      }

      window.toggleAuthMode = function(){
        authMode = authMode === 'login' ? 'signup' : 'login';
        updateAuthUI();
      };

      window.submitAuth = async function(){
        const email = document.getElementById('authEmail').value.trim();
        const pass = document.getElementById('authPassword').value.trim();
        const feedback = document.getElementById('authFeedback');

        if(!email || !pass){
          feedback.innerText = 'Please fill all fields';
          return;
        }

        try{
          if(authMode === 'signup'){
            const name = document.getElementById('authName').value.trim();
            await fetch('/api/users/register', {
              method:'POST',
              headers:{'Content-Type':'application/json'},
              body: JSON.stringify({name, email, password:pass})
            });
            alert('Account created! Please login.');
            toggleAuthMode();
            return;
          }

          const res = await fetch('/api/auth/login', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({email, password:pass})
          });

          if(res.ok){
            const data = await res.json();
            setToken(data.accessToken || data.token);
            closeAuthModal();
            location.reload();
          }else{
            feedback.innerText = 'Invalid credentials';
          }
        }catch(e){
          feedback.innerText = 'Network error';
        }
      };

      window.logout = function(){
        clearToken();
        location.reload();
      };

      window.applyFilters = applyFilters;
      window.addEventListener('DOMContentLoaded', () => {
        document.getElementById('priceMin').addEventListener('input', applyFilters);
        document.getElementById('priceMax').addEventListener('input', applyFilters);
        document.getElementById('searchInput').addEventListener('input', applyFilters);
        loadProducts();
        if(getToken()) document.getElementById('authBtn').innerHTML = '<i class="fas fa-user-check"></i>';
      });
    })();
</script>
</body>
</html>
