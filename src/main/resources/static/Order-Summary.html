<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Summary · DEPRA</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f4f7fb;
            padding: 2rem 1.5rem;
            color: #1e1e2a;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        :root {
            --primary: #7f1d1d;      /* deep maroon */
            --primary-light: #991b1b;
            --gold: #c9a23d;
            --gold-soft: #fbf6e9;
            --gray-bg: #f8fafc;
            --card-white: #ffffff;
            --border-light: #eef2f6;
            --text-secondary: #5b6778;
            --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.02), 0 2px 6px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 20px 30px -8px rgba(0, 0, 0, 0.06), 0 8px 12px -4px rgba(0, 0, 0, 0.03);
            --radius-card: 24px;
            --radius-element: 40px;
        }

        .container {
            max-width: 1120px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            gap: 1.2rem;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--primary);
            background: linear-gradient(135deg, #7f1d1d 0%, #a52828 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        .btn-back {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 0.7rem 1.6rem;
            border-radius: 40px;
            text-decoration: none;
            color: #1e293b;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back i {
            font-size: 0.9rem;
            color: var(--primary);
        }

        .btn-back:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 10px 18px -8px rgba(127, 29, 29, 0.2);
        }

        .btn-back:hover i {
            color: white;
        }

        /* Order Card */
        .order-card {
            background: var(--card-white);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            margin-bottom: 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(2px);
            transition: transform 0.2s;
        }

        .order-header {
            padding: 1.5rem 2rem;
            background: white;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .order-id {
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: -0.3px;
            color: #0f172a;
        }

        .order-id i {
            color: var(--primary);
            margin-right: 8px;
            font-size: 1.2rem;
        }

        .order-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .order-status {
            padding: 0.35rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            background: #f1f5f9;
            color: #334155;
        }

        .order-status.PENDING { background: #fef3c7; color: #b45309; }
        .order-status.CONFIRMED { background: #e0f2fe; color: #0369a1; }
        .order-status.SHIPPED { background: #dcfce7; color: #15803d; }
        .order-status.OUT_FOR_DELIVERY { background: #f3e8ff; color: #6b21a8; }
        .order-status.DELIVERED { background: #ede9fe; color: #5b21b6; }

        .order-date {
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .order-date i {
            color: var(--gold);
            font-size: 0.9rem;
        }

        /* ---- redesigned stepper (modern, clean) ---- */
        .tracking-progress {
            padding: 1.8rem 2rem 1.2rem;
            background: var(--gray-bg);
            border-bottom: 1px solid var(--border-light);
        }

        .steps {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            position: relative;
        }

        .progress-line {
            position: absolute;
            top: 24px;
            left: 0;
            right: 0;
            height: 3px;
            background: #dde3ea;
            z-index: 0;
            margin: 0 8px;
        }

        .step {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 2;
            background: transparent;
        }

        .step-icon {
            width: 48px;
            height: 48px;
            background: white;
            border: 2px solid #d1d9e6;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            color: #64748b;
            font-size: 1.3rem;
            transition: all 0.25s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
            background: #ffffff;
        }

        .step-icon.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 8px 14px -6px rgba(127, 29, 29, 0.3);
            transform: scale(1.02);
        }

        .step-icon.completed {
            background: #0f5132;
            border-color: #0f5132;
            color: white;
        }

        .step-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #1e293b;
            max-width: 90px;
            line-height: 1.3;
        }

        .step-label span {
            display: block;
            font-weight: 400;
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* Order Items */
        .order-items {
            padding: 1.2rem 2rem;
            background: white;
        }

        .item-row {
            display: flex;
            gap: 1.5rem;
            padding: 1.2rem 0;
            border-bottom: 1px solid #f1f5f9;
            align-items: center;
        }

        .item-row:last-child {
            border-bottom: none;
        }

        .item-img {
            width: 90px;
            height: 110px;
            object-fit: cover;
            border-radius: 18px;
            background: #f1f5f9;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            border: 1px solid #f0f0f0;
        }

        .item-details {
            flex: 1;
        }

        .item-name {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 6px;
            color: #0b1c2e;
        }

        .item-meta {
            display: flex;
            gap: 16px;
            align-items: baseline;
            flex-wrap: wrap;
        }

        .item-price {
            color: #475569;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .item-quantity {
            font-size: 0.85rem;
            color: #64748b;
            background: #f8fafc;
            padding: 2px 12px;
            border-radius: 30px;
            display: inline-block;
        }

        .item-subtotal {
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--primary);
            min-width: 90px;
            text-align: right;
        }

        /* Info section (address / payment) */
        .info-section {
            background: #fafcff;
            padding: 1.5rem 2rem;
            border-top: 1px solid var(--border-light);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            flex-wrap: wrap;
            gap: 2.5rem;
        }

        .info-block {
            flex: 1 1 200px;
        }

        .info-block h4 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6f7d8e;
            margin-bottom: 0.7rem;
            font-weight: 600;
        }

        .info-block p {
            font-weight: 500;
            color: #1e293b;
            line-height: 1.5;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-block i {
            color: var(--primary);
            width: 20px;
            font-size: 1rem;
        }

        /* Order summary (total) */
        .order-summary {
            background: white;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .total-label {
            font-size: 1.1rem;
            font-weight: 500;
            color: #334155;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .total-amount {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        /* Action buttons */
        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.8rem;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.85rem 2.2rem;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid transparent;
            box-shadow: var(--shadow-sm);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 12px 22px -10px rgba(127, 29, 29, 0.3);
        }

        .btn-primary i {
            color: #ffd966;
        }

        .btn-primary:hover {
            background: #991b1b;
            transform: translateY(-2px);
            box-shadow: 0 20px 28px -12px #7f1d1d80;
        }

        .btn-secondary {
            background: white;
            border: 1px solid #dde3ea;
            color: #1e293b;
        }

        .btn-secondary i {
            color: var(--primary);
        }

        .btn-secondary:hover {
            background: #f8fafc;
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Loading / error states */
        .state-message {
            background: white;
            border-radius: 28px;
            padding: 3rem 2rem;
            text-align: center;
            box-shadow: var(--shadow-md);
        }

        /* Responsive */
        @media (max-width: 640px) {
            body { padding: 1rem; }
            .order-header, .order-items, .info-section, .order-summary, .tracking-progress { padding: 1.2rem; }
            .item-row { flex-wrap: wrap; }
            .item-img { width: 70px; height: 90px; }
            .item-subtotal { text-align: left; min-width: auto; }
            .step-label { font-size: 0.7rem; }
            .step-icon { width: 40px; height: 40px; font-size: 1.1rem; }
            .progress-line { top: 20px; }
            .total-amount { font-size: 1.6rem; }
        }

        /* Utility */
        .text-accent { color: var(--gold); }
        i { line-height: 1; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">DEPRA</div>
        <a href="/products" class="btn-back"><i class="fas fa-arrow-left"></i> Continue Shopping</a>
    </div>
    <div id="orderContent">
        <!-- Loading placeholder -->
        <div class="state-message">
            <i class="fas fa-spinner fa-pulse" style="font-size: 2rem; color: var(--primary); margin-bottom: 1rem;"></i>
            <p style="color: #475569;">Fetching your order details...</p>
        </div>
    </div>
</div>

<script>
    (function(){
        const TOKEN_KEY = 'jwt_token';
        function getToken() { return localStorage.getItem(TOKEN_KEY); }

        // Expose globally for onerror
        window.handleImageError = function(img) {
            img.src = 'https://placehold.co/600x800/f3f4f6/7f1d1d?text=No+Image';
            img.onerror = null;
        };

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m] || m));
        }

        function showMessage(type, msg) {
            const container = document.getElementById('orderContent');
            const icon = type === 'error' ? 'fa-circle-exclamation' : 'fa-box-open';
            const color = type === 'error' ? '#b91c1c' : 'var(--primary)';
            container.innerHTML = `
                <div class="state-message">
                    <i class="fas ${icon}" style="font-size: 2.8rem; color: ${color}; margin-bottom: 1rem; opacity: 0.8;"></i>
                    <p style="font-size: 1.1rem; font-weight: 500; color: #1e293b;">${escapeHtml(msg)}</p>
                    <div style="margin-top: 2rem;">
                        <a href="/orders" class="btn btn-primary"><i class="fas fa-list-ul"></i> My Orders</a>
                        <a href="/products" class="btn btn-secondary" style="margin-left: 12px;"><i class="fas fa-store"></i> Shop</a>
                    </div>
                </div>
            `;
        }

        const orderId = new URLSearchParams(window.location.search).get('orderId');
        if (!orderId || orderId === 'undefined' || orderId === 'null') {
            showMessage('error', 'No order ID provided.');
        } else {
            const token = getToken();
            if (!token) {
                showMessage('error', 'Please log in to view your order.');
            } else {
                fetch(`/api/orders/${orderId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                })
                .then(res => {
                    if (!res.ok) throw new Error(`Order not found (${res.status})`);
                    return res.json();
                })
                .then(order => {
                    // Build tracking steps (modern, icon-based)
                    const steps = [
                        { key: 'PENDING', label: 'Order Placed', icon: 'fa-bag-shopping', sub: 'We received it' },
                        { key: 'CONFIRMED', label: 'Confirmed', icon: 'fa-clipboard-check', sub: 'Processing' },
                        { key: 'SHIPPED', label: 'Shipped', icon: 'fa-truck', sub: 'On the way' },
                        { key: 'OUT_FOR_DELIVERY', label: 'Out for Delivery', icon: 'fa-motorcycle', sub: 'Almost there' },
                        { key: 'DELIVERED', label: 'Delivered', icon: 'fa-home', sub: 'Completed' }
                    ];

                    let currentIndex = steps.findIndex(s => s.key === order.status);
                    if (currentIndex === -1) {
                        // fallback: if status not in predefined, try to match loosely
                        if (order.status === 'CANCELLED') {
                            showMessage('error', 'This order was cancelled.');
                            return;
                        }
                        currentIndex = 0; // default pending
                    }

                    const stepsHtml = steps.map((step, idx) => {
                        let statusClass = '';
                        if (idx < currentIndex) statusClass = 'completed';
                        else if (idx === currentIndex) statusClass = 'active';

                        // choose check icon for completed steps
                        let iconHtml = `<i class="fas ${step.icon}"></i>`;
                        if (statusClass === 'completed') {
                            iconHtml = `<i class="fas fa-check"></i>`;
                        }

                        return `
                            <div class="step">
                                <div class="step-icon ${statusClass}">
                                    ${iconHtml}
                                </div>
                                <div class="step-label">
                                    ${step.label}
                                    <span>${step.sub}</span>
                                </div>
                            </div>
                        `;
                    }).join('');

                    // Items rendering
                    const items = order.items || [];
                    const itemsHtml = items.map(item => {
                        const imgUrl = item.imageUrl || item.productImage || item.image || 'https://placehold.co/600x800/f8fafc/7f1d1d?text=Saree';
                        const price = item.priceAtTime || item.price || 0;
                        const subtotal = item.subtotal || (price * (item.quantity || 1));
                        return `
                            <div class="item-row">
                                <img class="item-img" src="${escapeHtml(imgUrl)}" alt="${escapeHtml(item.name)}" onerror="handleImageError(this)">
                                <div class="item-details">
                                    <div class="item-name">${escapeHtml(item.name)}</div>
                                    <div class="item-meta">
                                        <span class="item-price">₹${parseFloat(price).toFixed(2)}</span>
                                        <span class="item-quantity"><i class="far fa-cube"></i> Qty: ${item.quantity}</span>
                                    </div>
                                </div>
                                <div class="item-subtotal">₹${parseFloat(subtotal).toFixed(2)}</div>
                            </div>
                        `;
                    }).join('') || '<div style="padding:1rem 0; color:#64748b; text-align:center;">No items found.</div>';

                    const deliveryInfo = order.shippingAddress || 'Address not provided';
                    const paymentMethod = order.paymentMethod || 'Cash on Delivery';
                    const orderDate = order.orderDate ? new Date(order.orderDate) : new Date();
                    const formattedDate = orderDate.toLocaleDateString('en-IN', { day:'numeric', month:'long', year:'numeric' });
                    const orderDisplayId = order.orderId || order.id || orderId;

                    const html = `
                        <div class="order-card">
                            <div class="order-header">
                                <div class="order-id">
                                    <i class="fas fa-receipt"></i>
                                    #${escapeHtml(orderDisplayId)}
                                </div>
                                <div class="order-meta">
                                    <span class="order-status ${escapeHtml(order.status)}">${escapeHtml(order.status)}</span>
                                    <span class="order-date"><i class="far fa-calendar-alt"></i> ${formattedDate}</span>
                                </div>
                            </div>

                            <div class="tracking-progress">
                                <div class="steps">
                                    <div class="progress-line"></div>
                                    ${stepsHtml}
                                </div>
                            </div>

                            <div class="order-items">
                                ${itemsHtml}
                            </div>

                            <div class="info-section">
                                <div class="info-block">
                                    <h4><i class="fas fa-map-pin"></i> Delivery Address</h4>
                                    <p><i class="fas fa-location-dot"></i> ${escapeHtml(deliveryInfo)}</p>
                                </div>
                                <div class="info-block">
                                    <h4><i class="fas fa-credit-card"></i> Payment Method</h4>
                                    <p><i class="fas fa-shield"></i> ${escapeHtml(paymentMethod)}</p>
                                </div>
                            </div>

                            <div class="order-summary">
                                <span class="total-label"><i class="fas fa-coins" style="color: var(--gold);"></i> Total Amount</span>
                                <span class="total-amount">₹${parseFloat(order.totalAmount || 0).toFixed(2)}</span>
                            </div>
                        </div>

                        <div class="action-buttons">
                            <a href="/order-tracking.html?orderId=${escapeHtml(orderDisplayId)}" class="btn btn-primary">
                                <i class="fas fa-map-location-dot"></i> Track Order
                            </a>
                            <a href="/orders" class="btn btn-secondary">
                                <i class="fas fa-clock-rotate-left"></i> Order History
                            </a>
                            <a href="/support" class="btn btn-secondary">
                                <i class="fas fa-headset"></i> Need Help?
                            </a>
                        </div>
                    `;
                    document.getElementById('orderContent').innerHTML = html;
                })
                .catch(err => {
                    console.warn(err);
                    showMessage('error', err.message || 'Unable to load order details.');
                });
            }
        }
    })();
</script>
<!-- small fallback for placeholders -->
</body>
</html>
